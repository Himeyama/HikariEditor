<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="./min/vs/editor/editor.main.css" />
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        #container {
            height: 100%;
        }

        @media(prefers-color-scheme: dark) {
            body {
                background-color: #1E1E1E;
            }
        }

        @media(prefers-color-scheme: light) {
            body {
                background-color: #fffffe;
            }
        }
    </style>
</head>

<body>
    <div id="container"></div>
    <script src="./min/vs/loader.js"></script>
    <script>
        require.config({ paths: { 'vs': './min/vs' } });
    </script>
    <script src="./min/vs/editor/editor.main.nls.js"></script>
    <script src="./min/vs/editor/editor.main.js"></script>
    <script>
        // URL クエリから初期テーマを取得する（既定はダーク）
        let param = document.location.search.substring(1);
        let params = {};
        for (const kv of param.split('&')) {
            const [k, v] = kv.split('=');
            if (k) params[k] = v;
        }
        let theme = params["theme"] || "vs-dark";

        // 拡張子 → Monaco の言語 ID。タブごとにファイルが異なるため、model 生成時に都度引く。
        const extensions = {
            ".rb": "ruby",
            ".py": "python",
            ".txt": "plaintext",
            ".bat": "bat",
            ".c": "c",
            ".cpp": "cpp",
            ".cs": "csharp",
            ".css": "css",
            ".go": "go",
            ".html": "html",
            ".htm": "htm",
            ".ini": "ini",
            ".java": "java",
            ".js": "javascript",
            ".md": "markdown",
            ".markdown": "markdown",
            ".rs": "rust",
            ".pl": "perl",
            ".php": "php",
            ".r": "r",
            ".ts": "typescript",
            ".scss": "scss",
            ".xml": "xml",
            ".xaml": "xml",
            ".yaml": "yaml",
            ".json": "json",
            ".vb": "vb",
            ".h": "c",
            ".tex": "latex"
        };
        function langFor(path) {
            const dot = path.lastIndexOf('.');
            const ext = dot >= 0 ? path.substring(dot).toLowerCase() : '';
            const lang = extensions[ext];
            return lang === undefined ? null : lang;
        }

        // latex の言語登録は model 生成より前に行う
        monaco.languages.register({ id: 'latex' });
        monaco.languages.setMonarchTokensProvider("latex", {
            /* Apache License, Version 2.0 */
            /* https://github.com/koka-lang/madoko */
            "displayName": "Latex",
            "name": "latex",
            "mimeTypes": ["text/latex", "text/tex"],
            "fileExtensions": ["tex", "sty", "cls"],

            "lineComment": "% ",

            "builtin": [
                "addcontentsline", "addtocontents", "addtocounter", "address", "addtolength", "addvspace", "alph", "appendix",
                "arabic", "author", "backslash", "baselineskip", "baselinestretch", "bf", "bibitem", "bigskipamount", "bigskip",
                "boldmath", "boldsymbol", "cal", "caption", "cdots", "centering", "chapter", "circle", "cite", "cleardoublepage",
                "clearpage", "cline", "closing", "color", "copyright", "dashbox", "date", "ddots", "documentclass", "dotfill", "em",
                "emph", "ensuremath", "epigraph", "euro", "fbox", "flushbottom", "fnsymbol", "footnote", "footnotemark",
                "footnotesize", "footnotetext", "frac", "frame", "framebox", "frenchspacing", "hfill", "hline", "href", "hrulefill",
                "hspace", "huge", "Huge", "hyphenation", "include", "includegraphics", "includeonly", "indent", "input", "it", "item",
                "kill", "label", "large", "Large", "LARGE", "LaTeX", "LaTeXe", "ldots", "left", "lefteqn", "line", "linebreak",
                "linethickness", "linewidth", "listoffigures", "listoftables", "location", "makebox", "maketitle", "markboth",
                "mathcal", "mathop", "mbox", "medskip", "multicolumn", "multiput", "newcommand", "newcolumntype", "newcounter",
                "newenvironment", "newfont", "newlength", "newline", "newpage", "newsavebox", "newtheorem", "nocite", "noindent",
                "nolinebreak", "nonfrenchspacing", "normalsize", "nopagebreak", "not", "onecolumn", "opening", "oval", "overbrace",
                "overline", "pagebreak", "pagenumbering", "pageref", "pagestyle", "par", "paragraph", "parbox", "parindent", "parskip",
                "part", "protect", "providecommand", "put", "raggedbottom", "raggedleft", "raggedright", "raisebox", "ref",
                "renewcommand", "right", "rm", "roman", "rule", "savebox", "sbox", "sc", "scriptsize", "section", "setcounter",
                "setlength", "settowidth", "sf", "shortstack", "signature", "sl", "slash", "small", "smallskip", "sout", "space", "sqrt",
                "stackrel", "stepcounter", "subparagraph", "subsection", "subsubsection", "tableofcontents", "telephone", "TeX",
                "textbf", "textcolor", "textit", "textmd", "textnormal", "textrm", "textsc", "textsf", "textsl", "texttt", "textup",
                "textwidth", "textheight", "thanks", "thispagestyle", "tiny", "title", "today", "tt", "twocolumn", "typeout", "typein",
                "uline", "underbrace", "underline", "unitlength", "usebox", "usecounter", "uwave", "value", "vbox", "vcenter", "vdots",
                "vector", "verb", "vfill", "vline", "vphantom", "vspace",

                "RequirePackage", "NeedsTeXFormat", "usepackage", "input", "include", "documentclass", "documentstyle",
                "def", "edef", "defcommand", "if", "ifdim", "ifnum", "ifx", "fi", "else", "begingroup", "endgroup",
                "definecolor", "textcolor", "color",
                "eifstrequal", "eeifstrequal"
            ],
            "tokenizer": {
                "root": [
                    ["(\\\\begin)(\\s*)(\\{)([\\w\\-\\*\\@]+)(\\})",
                        ["keyword.predefined", "white", "@brackets", { "token": "tag.env-$4", "bracket": "@open" }, "@brackets"]],
                    ["(\\\\end)(\\s*)(\\{)([\\w\\-\\*\\@]+)(\\})",
                        ["keyword.predefined", "white", "@brackets", { "token": "tag.env-$4", "bracket": "@close" }, "@brackets"]],
                    ["\\\\[^a-zA-Z@]", "keyword"],
                    ["\\@[a-zA-Z@]+", "keyword.at"],
                    ["\\\\([a-zA-Z@]+)", {
                        "cases": {
                            "$1@builtin": "keyword.predefined",
                            "@default": "keyword"
                        }
                    }],
                    { "include": "@whitespace" },
                    ["[{}()\\[\\]]", "@brackets"],
                    ["#+\\d", "number.arg"],
                    ["\\-?(?:\\d+(?:\\.\\d+)?|\\.\\d+)\\s*(?:em|ex|pt|pc|sp|cm|mm|in)", "number.len"]
                ],

                "whitespace": [
                    ["[ \\t\\r\\n]+", "white"],
                    ["%.*$", "comment"]
                ]
            }
        });

        // 単一の Monaco インスタンスを生成し、タブごとに model を切り替えて共有する。
        // これによりタブを増やしてもエディタ本体・ワーカーは 1 組で済む。
        const editor = monaco.editor.create(document.getElementById('container'), {
            value: "",
            theme: theme,
            automaticLayout: true
        });

        // ファイルパスをキーに model と編集状態を管理する
        const models = {};      // path -> ITextModel
        const baselines = {};   // path -> 直近に同期した内容（\n 正規化済み）
        const dirty = {};       // path -> 前回 tick 以降に変更があったか
        let currentPath = null; // 現在表示中の model のパス

        // ホスト (C#) との通信は WebView2 標準のメッセージングで行う。
        // JS → ホスト: JSON 文字列を postMessage。ホスト → JS: PostWebMessageAsJson。
        function post(obj) {
            window.chrome.webview.postMessage(JSON.stringify(obj));
        }

        window.chrome.webview.addEventListener('message', e => {
            const msg = e.data; // PostWebMessageAsJson はパース済みオブジェクトで届く
            switch (msg.type) {
                case 'open':
                    openModel(msg.path, msg.src);
                    break;
                case 'switch':
                    switchModel(msg.path);
                    break;
                case 'close':
                    closeModel(msg.path);
                    break;
                case 'paste':
                    do_paste(msg.text);
                    break;
                case 'copy-request':
                    do_copy();
                    break;
                case 'save-request': {
                    // 改行コード切替などホスト起点の保存要求。対象 model の内容を save で返す
                    const model = models[msg.path];
                    if (model) post({ type: 'save', path: msg.path, src: model.getValue().replace(/\r\n/g, "\n") });
                    break;
                }
            }
        });

        // 新規ファイルを model として開く（既存なら内容を差し替える）
        function openModel(path, src) {
            let model = models[path];
            if (!model) {
                model = monaco.editor.createModel(src, langFor(path));
                models[path] = model;
                model.onDidChangeContent(() => { dirty[path] = true; });
            } else {
                model.setValue(src);
            }
            // 読み込み直後を基準にし、初回の自動保存が走らないようにする
            baselines[path] = src.replace(/\r\n/g, "\n");
            dirty[path] = false;
            currentPath = path;
            editor.setModel(model);
        }

        // タブ切替: 既存 model を表示する
        function switchModel(path) {
            const model = models[path];
            if (!model) return;
            currentPath = path;
            editor.setModel(model);
        }

        // タブを閉じる: model を破棄してメモリを解放する
        function closeModel(path) {
            const model = models[path];
            if (model) model.dispose();
            delete models[path];
            delete baselines[path];
            delete dirty[path];
            if (currentPath === path) currentPath = null;
        }

        // 初期化完了をホストへ通知。以降ホストが open/switch/close を送ってくる
        post({ type: 'ready' });

        // テーマ追従は毎秒ポーリングせず OS の変更イベントでのみ更新する。
        // setTheme はグローバル操作で再描画を伴うため、毎秒呼ぶと重い。
        const lightMql = window.matchMedia('(prefers-color-scheme: light)');
        lightMql.addEventListener('change', e => {
            monaco.editor.setTheme(e.matches ? "vs-light" : "vs-dark");
        });

        // 変更のあった model だけを自動保存する。dirty フラグで全文シリアライズを最小化する。
        setInterval(tick, 1000);
        function tick() {
            for (const path in models) {
                if (!dirty[path]) continue;
                dirty[path] = false;
                const src = models[path].getValue().replace(/\r\n/g, "\n");
                if (baselines[path] !== src) {
                    baselines[path] = src;
                    post({ type: 'autosave', path, src });
                }
            }
        }

        document.addEventListener("keydown", (event) => {
            if (event.ctrlKey && event.key === 's') {
                event.preventDefault();
                if (!currentPath) return;
                const src = editor.getValue().replace(/\r\n/g, "\n");
                post({ type: 'save', path: currentPath, src });
            }
        });

        function do_paste(text) {
            const selection = editor.getSelection();
            if (!selection) return;
            editor.executeEdits("clipboard", [{
                range: selection,
                text: text,
                forceMoveMarkers: true,
            }]);
        }

        function do_copy() {
            const model = editor.getModel();
            if (!model) return;
            let text = model.getValueInRange(editor.getSelection());
            if (text === "") return;
            text = text.replace(/\r\n/g, "\n");
            post({ type: 'copy', text });
        }
    </script>
</body>

</html>
