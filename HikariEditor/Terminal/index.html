<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            /* ターミナルの背景は UI テーマに関わらず常に黒 */
            background: #000000;
            overflow: hidden;
        }

        #terminal {
            width: 100%;
            height: 100%;
            padding: 4px 0 0 6px;
            box-sizing: border-box;
        }

        /* xterm 既定のフォントを上書きし、Cascadia Code を主、BIZ UDGothic を全角フォールバックとして使う */
        .xterm {
            font-family: "Cascadia Code", "BIZ UDGothic", Consolas, monospace;
        }
    </style>
</head>

<body>
    <div id="terminal"></div>
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const isLight = params.get('theme') === 'light';
            if (isLight) document.body.classList.add('light');

            // ANSI 16 色パレット（通常色 / bright 色）。light・dark どちらの
            // UI テーマでも共通で使う。
            const ansiPalette = {
                black: '#000000', brightBlack: '#6F7372',
                red: '#C60000', brightRed: '#FF2525',
                green: '#5A9A00', brightGreen: '#8BE133',
                yellow: '#C5A800', brightYellow: '#EADF4A',
                blue: '#3C69A8', brightBlue: '#7DA4D1',
                magenta: '#7B5B84', brightMagenta: '#AB86AF',
                cyan: '#13989B', brightCyan: '#46D3D5',
                white: '#C7C9C5', brightWhite: '#E3E3E3'
            };

            const term = new Terminal({
                fontFamily: '"Cascadia Code", "BIZ UDGothic", Consolas, monospace',
                fontSize: 14,
                cursorBlink: true,
                cursorStyle: 'bar',
                convertEol: false,
                allowProposedApi: true,
                theme: isLight ? {
                    // 背景は常に黒。前景・カーソルは light でも視認できる明色を使う
                    background: '#000000',
                    foreground: '#f0f0f0',
                    cursor: '#f0f0f0',
                    selectionBackground: '#264f78',
                    ...ansiPalette
                } : {
                    background: '#000000',
                    foreground: '#f0f0f0',
                    cursor: '#f0f0f0',
                    selectionBackground: '#264f78',
                    ...ansiPalette
                }
            });
            const fit = new FitAddon.FitAddon();
            term.loadAddon(fit);
            term.open(document.getElementById('terminal'));
            fit.fit();

            // 端末サイズ（cols/rows）を C# 側（ConPTY）へ通知する
            function postSize() {
                try {
                    window.chrome.webview.postMessage(JSON.stringify({
                        type: 'resize',
                        cols: term.cols,
                        rows: term.rows
                    }));
                } catch (_) { }
            }

            window.addEventListener('resize', () => {
                fit.fit();
                postSize();
            });

            // ユーザー入力 → C#
            term.onData((data) => {
                try {
                    window.chrome.webview.postMessage(JSON.stringify({
                        type: 'input',
                        data: data
                    }));
                } catch (_) { }
            });

            // Base64 文字列を Uint8Array に復元する（出力は ConPTY の生バイト列）
            function b64ToBytes(b64) {
                const bin = atob(b64);
                const len = bin.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
                return bytes;
            }

            // C# → ターミナル出力。バイト列を渡せば xterm.js が UTF-8 を解釈する
            window.chrome.webview.addEventListener('message', (event) => {
                const msg = event.data;
                if (msg && msg.type === 'write') {
                    term.write(b64ToBytes(msg.data));
                } else if (msg && msg.type === 'clear') {
                    term.clear();
                }
            });

            // 準備完了を初期サイズ付きで通知する（この時点でシェルが起動される）
            try {
                window.chrome.webview.postMessage(JSON.stringify({
                    type: 'ready',
                    cols: term.cols,
                    rows: term.rows
                }));
            } catch (_) { }

            term.focus();
        })();
    </script>
</body>

</html>
